version: '3.9'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=mysecret
    depends_on:
      - db
    networks:
      - app-net

  db:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=mysecret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net

volumes:
  postgres-data:

networks:
  app-net:
    driver: bridge