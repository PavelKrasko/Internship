name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd TASK-7-ci-cd
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd TASK-7-ci-cd
          pytest tests/ -v